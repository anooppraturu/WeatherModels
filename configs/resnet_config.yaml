project:
  run_name: position_res_scale
  seed: 42
  output_dir: checkpoints/

data:
  dataset_path: data/weatherbench64_shards
  input_steps: 4
  lead_steps: 1
  flatten_time: true

  batch_size: 32
  num_workers: 0
  pin_memory: false

model:
  architecture: periodicresnet
  in_channels: 16
  out_channels: 4
  hidden_channels: 96
  kernel_size: 3
  padding: 1
  depth: 8
  predict_residual: true
  residual_scale: 0.2
  scale_mode: position
  post_nl: true
  lat_pat_mode: reflect

optimizer:
  name: adamw
  lr: 0.005
  weight_decay: 0.0001

training:
  epochs: 3
  log_every: 20
  val_every: 100
  patience: 5
  min_delta: 0.0
  device: auto

mlflow:
  enabled: true
  tracking_uri: sqlite:///mlflow.db
  experiment_name: base_resnet_models
  artifact_dir: mlartifacts