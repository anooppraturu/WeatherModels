project:
  run_name: d6_resnet_retry
  seed: 42
  output_dir: checkpoints/

data:
  dataset_path: data/weatherbench64_shards
  input_steps: 4
  lead_steps: 1
  flatten_time: true

  batch_size: 64
  num_workers: 0
  pin_memory: false

model:
  architecture: deepresnet
  in_channels: 16
  out_channels: 4
  hidden_channels: 128
  kernel_size: 5
  padding: 2
  depth: 6
  predict_residual: false
  residual_scale: 1.0

optimizer:
  name: adamw
  lr: 0.005
  weight_decay: 0.000001

training:
  epochs: 3
  log_every: 20
  val_every: 100
  patience: 5
  min_delta: 0.0
  device: auto

mlflow:
  enabled: true
  tracking_uri: sqlite:///mlflow.db
  experiment_name: multi_epoch_debug
  artifact_dir: mlartifacts