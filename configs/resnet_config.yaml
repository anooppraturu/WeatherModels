project:
  run_name: deep_resnet_baseline
  seed: 42
  output_dir: checkpoints/script_test

data:
  dataset_path: data/weatherbench64_shards
  input_steps: 4
  lead_steps: 1
  flatten_time: true

  batch_size: 64
  num_workers: 0
  pin_memory: false

model:
  architecture: deepresnet
  in_channels: 16
  out_channels: 4
  hidden_channels: 32
  kernel_size: 3
  padding: 1
  depth: 2
  predict_residual: true
  residual_scale: 1.0

optimizer:
  name: adamw
  lr: 0.005
  weight_decay: 0.000001

training:
  epochs: 1
  log_every: 20
  val_every: 20
  patience: 10
  min_delta: 0.0
  device: auto