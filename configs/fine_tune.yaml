model:
  data_dir: checkpoints/weak_reg
  run_name: n3_ft_smalllr

data:
  dataset_path: data/weatherbench64_shards
  input_steps: 4
  lead_steps: 2
  flatten_time: true
  lat_channels: false

  batch_size: 32
  num_workers: 0
  pin_memory: false

training:
  epochs: 1
  log_every: 20
  val_every: 100
  patience: 10
  min_delta: 0.0
  device: auto

optimizer:
  name: adamw
  lr: 0.001
  weight_decay: 0.0000001

mlflow:
  enabled: true
  tracking_uri: sqlite:///mlflow.db
  experiment_name: fine_tune_experiments
  artifact_dir: mlartifacts